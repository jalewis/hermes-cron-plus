name: cron-plus
version: 0.1.2
description: "Subprocess-per-job cron scheduler. Replacement for the in-process workdir-serializing built-in scheduler. Coexists with built-in cron via disjoint job storage at ~/.hermes/cron-plus/jobs.json."
author: jalewis
requires_env: []
provides_tools: []
provides_hooks: []
# Optional env vars (CRON_PLUS_TICK_INTERVAL_S, CRON_PLUS_DISABLED,
# CRON_PLUS_LOG_LEVEL) are documented in README.md "Environment variables".
# Hermes' plugin.yaml schema only defines `requires_env`; optional config
# lives in the README rather than as a non-standard manifest field.
